<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lottery Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-paper: #f9f7f2;
            --accent-blue: #248bed;
            --text-main: #333333;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e0e0e0; /* Darker background to make "paper" pop */
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            text-transform: uppercase; /* ALL CAPS */
        }

        /* The Ticket Container */
        .ticket {
            background: var(--bg-paper);
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            min-height: 80vh;
        }

        /* Serrated/Tear-off edge effect top/bottom */
        .ticket::before {
            content: "";
            position: absolute;
            top: -10px; left: 0; right: 0;
            height: 10px;
            background-size: 20px 20px;
            background-image: radial-gradient(circle at 10px -5px, transparent 12px, var(--bg-paper) 13px);
        }

        h1 { font-weight: 900; font-size: 26px; margin: 0; color: var(--accent-blue); letter-spacing: 1px; }
        .timer { font-size: 13px; margin: 10px 0; font-weight: 700; opacity: 0.7; }
        .prize { font-size: 28px; font-weight: 900; margin: 15px 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }

        /* Ticket Numbers Table Style */
        .ticket-list-title { margin-top: 30px; font-size: 16px; font-weight: 900; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { 
            padding: 15px 5px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: 900;
            border: none; /* Removed Border Lines */
            letter-spacing: 2px;
        }

        /* Claim Button Section */
        .action-zone {
            margin-top: 40px;
            border-top: 2px dashed #ccc; /* Tear-off line */
            padding-top: 30px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 0; /* Square button for ticket look */
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 4px 0px #1a66ad;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0px #1a66ad; }
        button:disabled { background-color: #bbb; box-shadow: none; opacity: 0.6; }

        .status-msg { margin-top: 10px; font-size: 12px; font-weight: 700; color: #888; }
    </style>
</head>
<body>

    <div class="ticket">
        <h1>DAILY LOTTERY</h1>
        <div id="lotteryTimer" class="timer">LOADING STATUS...</div>
        <div class="prize">PRIZE: 1,000 USDT</div>

        <div class="ticket-list-title">YOUR TICKETS (<span id="count">0</span>/50)</div>
        <table id="ticketTable">
            </table>

        <div class="action-zone">
            <button id="claimBtn" disabled>CONNECTING...</button>
            <div id="cooldownLabel" class="status-msg">PLEASE WAIT...</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
  apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
  authDomain: "upwebapp-19b3a.firebaseapp.com",
  databaseURL: "https://upwebapp-19b3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "upwebapp-19b3a",
  storageBucket: "upwebapp-19b3a.firebasestorage.app",
  messagingSenderId: "746730266775",
  appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2",
  measurementId: "G-9PF085FM41"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        
        let myTickets = [];
        let lastClaim = 0;
        const COOLDOWN_MS = 10 * 60 * 1000;

        async function initApp() {
            try {
                await firebase.auth().signInAnonymously();
                const userId = tg.initDataUnsafe?.user?.id || "WEB_USER";
                const userRef = db.ref('users/' + userId);

                userRef.on('value', (snap) => {
                    const data = snap.val();
                    myTickets = data?.tickets || [];
                    lastClaim = data?.lastClaim || 0;
                    renderUI();
                });
            } catch (e) {
                document.getElementById('lotteryTimer').innerText = "ERROR CONNECTING";
            }
        }

        function renderUI() {
            const table = document.getElementById('ticketTable');
            table.innerHTML = "";
            document.getElementById('count').innerText = myTickets.length;
            
            for (let i = 0; i < myTickets.length; i += 3) {
                let row = table.insertRow();
                for (let j = 0; j < 3; j++) {
                    let cell = row.insertCell();
                    cell.innerText = myTickets[i + j] || "";
                }
            }
            updateStatus();
        }

        function updateStatus() {
            const now = new Date();
            const hour = now.getHours();
            const btn = document.getElementById('claimBtn');
            const cdLabel = document.getElementById('cooldownLabel');
            const timerEl = document.getElementById('lotteryTimer');

            const isLotteryOpen = (hour >= 17 || hour < 0);
            
            if (isLotteryOpen) timerEl.innerText = "STATUS: OPEN FOR ENTRIES";
            else if (hour >= 14 && hour < 17) timerEl.innerText = "STATUS: GENERATING RESULTS";
            else timerEl.innerText = "STATUS: CLOSED (OPENS AT 5PM)";

            const elapsed = Date.now() - lastClaim;
            
            if (!isLotteryOpen) {
                btn.disabled = true;
                btn.innerText = "LOTTERY CLOSED";
                cdLabel.innerText = "NEXT ROUND AT 17:00";
            } else if (myTickets.length >= 50) {
                btn.disabled = true;
                btn.innerText = "LIMIT REACHED";
                cdLabel.innerText = "50 TICKETS MAX PER DAY";
            } else if (elapsed < COOLDOWN_MS) {
                btn.disabled = true;
                const rem = Math.ceil((COOLDOWN_MS - elapsed) / 1000);
                btn.innerText = "COOLDOWN ACTIVE";
                cdLabel.innerText = `NEXT CLAIM IN: ${Math.floor(rem/60)}M ${rem%60}S`;
            } else {
                btn.disabled = false;
                btn.innerText = "WATCH AD & CLAIM";
                cdLabel.innerText = "READY TO PRINT TICKET";
            }
        }

        async function handleClaim() {
            tg.HapticFeedback.impactOccurred('medium');
            alert("WATCHING REWARD VIDEO..."); 
            
            setTimeout(() => {
                const newNum = Math.floor(100000 + Math.random() * 900000);
                const updatedTickets = [...myTickets, newNum];
                const userId = tg.initDataUnsafe?.user?.id || "WEB_USER";

                db.ref('users/' + userId).update({
                    tickets: updatedTickets,
                    lastClaim: firebase.database.ServerValue.TIMESTAMP
                }).catch(err => tg.showAlert("DENIED: " + err.message));
            }, 1500);
        }

        document.getElementById('claimBtn').onclick = handleClaim;
        setInterval(updateStatus, 1000);
        
        tg.ready();
        tg.expand();
        initApp();
    </script>
</body>
</html>
