<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #248bed;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 20px;
            padding-bottom: 50px;
        }
        .left-align { text-align: left; }
        .timer { color: #e74c3c; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .prize { font-size: 1.5rem; color: #2ecc71; font-weight: 800; }
        .spacer { height: 35px; }
        .section-title { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.03); border-radius: 8px; overflow: hidden; }
        td { border: 1px solid var(--tg-theme-hint-color); padding: 12px; text-align: center; font-family: monospace; font-weight: bold; width: 25%; }
        
        .claim-btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; padding: 18px; border-radius: 12px;
            font-size: 1rem; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer;
        }
        .claim-btn:disabled { background-color: var(--tg-theme-hint-color); opacity: 0.6; }
        #cooldown-text { text-align: center; font-size: 0.85rem; margin-top: 8px; color: var(--tg-theme-hint-color); }
        #winner-box { display: none; background: #f1c40f; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="winner-box">🎉 LATEST WINNER: #<span id="win-num"></span> 🎉</div>

    <div class="left-align">
        <h1 style="margin:0;">Daily Lottery</h1>
        <div id="lottery-timer" class="timer">Checking status...</div>
        <div class="prize">$500.00 PRIZE</div>
    </div>

    <div class="spacer"></div>

    <div class="section-title">Your Tickets (<span id="count">0</span>/50)</div>
    <table id="ticket-table"></table>

    <button id="claim-btn" class="claim-btn" onclick="handleClaim()">CLAIM TICKET (Watch Ad)</button>
    <div id="cooldown-text"></div>

    <script>
        // 1. Move variable declarations to the top (Global Scope)
const tg = window.Telegram.WebApp; 
let AdController; // Don't init here yet
let userTickets = [];
let nextClaimTime = 0;
let userId = "guest_user";

// 2. Initialize Firebase (Keep your config here)
const firebaseConfig = { 
    apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8", 
    projectId: "upwebapp-19b3a", 
    appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 3. Main Initialization Function
async function init() {
    // Ensure TG is ready
    tg.expand();
    tg.ready();
    
    // Set userId safely
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userId = tg.initDataUnsafe.user.id.toString();
    }

    // Initialize AdsGram safely
    if (window.Adsgram) {
        AdController = window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID" });
    } else {
        console.error("AdsGram SDK not loaded");
    }

    loadUserData();
    checkGlobalWinner();
    setInterval(updateUI, 1000);
}

// 4. Update handleClaim to check for AdController
async function handleClaim() {
    if (!AdController) {
        tg.showAlert("Ads are still loading, please wait a moment.");
        return;
    }

    try {
        const result = await AdController.show({ userId: userId });
        if (result.done) {
            tg.showAlert("Ad finished! Your ticket is being processed...");
            setTimeout(() => {
                loadUserData(); 
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    } catch (e) {
        console.error(e);
        tg.showAlert("Error playing ad.");
    }
}

// 5. Start the app
init();
    </script>
</body>
</html>
