<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Mini App</title>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #chart {
      height: 50vh;
    }

    #panel {
      padding: 15px;
    }

    h2, h3 {
      margin: 8px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      color: #fff;
    }

    #buy { background: #16c784; }
    #sell { background: #ea3943; }

    #log {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      max-height: 80px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

  <div id="chart"></div>

  <div id="panel">
    <h3 id="user">Loading...</h3>
    <h2>Balance: $<span id="balance">0</span></h2>
    <h3>Position: <span id="position">0</span> BTC</h3>

    <div class="row">
      <button id="buy">BUY $10</button>
      <button id="sell">SELL $10</button>
    </div>

    <div id="log"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- USER ---
    const user = tg.initDataUnsafe?.user || {};
    const userId = user.id || "guest";
    const name = user.first_name || "Guest";

    document.getElementById("user").innerText = `Hello, ${name}`;

    // --- STORAGE KEYS ---
    const BAL_KEY = "bal_" + userId;
    const POS_KEY = "pos_" + userId;

    // --- STATE ---
    let balance = parseFloat(localStorage.getItem(BAL_KEY)) || 1000;
    let position = parseFloat(localStorage.getItem(POS_KEY)) || 0;
    let price = 30000; // fake price (can upgrade later)

    const balanceEl = document.getElementById("balance");
    const positionEl = document.getElementById("position");
    const logEl = document.getElementById("log");

    function render() {
      balanceEl.innerText = balance.toFixed(2);
      positionEl.innerText = position.toFixed(5);
    }

    function log(msg) {
      const p = document.createElement("div");
      p.innerText = msg;
      logEl.prepend(p);
    }

    function save() {
      localStorage.setItem(BAL_KEY, balance);
      localStorage.setItem(POS_KEY, position);
    }

    // --- TRADING LOGIC ---
    function buy(amountUSD) {
      if (balance < amountUSD) {
        log("❌ Not enough balance");
        return;
      }
      const btc = amountUSD / price;
      balance -= amountUSD;
      position += btc;
      save();
      render();
      log(`✅ Bought $${amountUSD} BTC`);
    }

    function sell(amountUSD) {
      const btc = amountUSD / price;
      if (position < btc) {
        log("❌ Not enough BTC");
        return;
      }
      position -= btc;
      balance += amountUSD;
      save();
      render();
      log(`✅ Sold $${amountUSD} BTC`);
    }

    document.getElementById("buy").onclick = () => buy(10);
    document.getElementById("sell").onclick = () => sell(10);

    render();

    // --- TRADINGVIEW CHART ---
    new TradingView.widget({
      container_id: "chart",
      width: "100%",
      height: "100%",
      symbol: "BINANCE:BTCUSDT",
      interval: "15",
      timezone: "Asia/Kolkata",
      theme: "dark",
      style: "1",
      locale: "en",
      hide_top_toolbar: false,
      enable_publishing: false,
      studies: ["RSI@tv-basicstudies"]
    });
  </script>

</body>
</html>
