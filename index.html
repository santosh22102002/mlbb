<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOBA COIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --bg: #0f172a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        .page { display: none; flex: 1; padding: 20px; text-align: center; overflow-y: auto; }
        .active { display: block; }
        
        /* Game UI */
        .coin { width: 200px; height: 200px; background: radial-gradient(#ffd700, #b8860b); border-radius: 50%; margin: 30px auto; border: 8px solid #facc15; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: transform 0.1s; box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        .coin:active { transform: scale(0.95); }
        .stats { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .energy-bar { width: 100%; height: 20px; background: #334155; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .energy-fill { height: 100%; background: #22c55e; width: 100%; transition: width 0.3s; }
        
        /* Nav */
        nav { display: flex; background: #1e293b; padding: 10px; justify-content: space-around; }
        nav button { background: none; border: none; color: white; font-weight: bold; }
        
        .timer { font-size: 14px; color: #94a3b8; }
        .booster-active { border: 2px solid #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="main" class="page active">
        <div class="timer" id="seasonTimer">Season Ends: 0d 0h 0m</div>
        <h1 id="scoreDisplay">0</h1>
        <div class="coin" id="clicker">💰</div>
        <div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div>
        <p>Energy: <span id="energyText">500</span>/500</p>
        <div id="refillTimer" class="timer"></div>
        <br>
        <button onclick="activateBooster()" style="padding:10px; background:#e11d48; color:white; border-radius:5px; border:none;">🚀 10x Booster (Watch Ads)</button>
    </div>

    <div id="leaderboard" class="page">
        <h2>Global Top 100</h2>
        <div id="rankDisplay" style="margin-bottom:15px; color:#38bdf8;">Your Rank: Loading...</div>
        <table style="width:100%; text-align: left;" id="leaderboardTable">
            </table>
    </div>

    <div id="referral" class="page">
        <h2>Invite Friends</h2>
        <p>Get +10,000 per active friend!</p>
        <div style="background:#1e293b; padding:15px; border-radius:10px;">
            <code id="refLink">t.me/MobaCoinBot?start=id123</code>
        </div>
        <p style="font-size:12px; color:#94a3b8;">*Friend must earn 1,000 points this season to qualify.</p>
    </div>

    <nav>
        <button onclick="showPage('main')">GAME</button>
        <button onclick="showPage('leaderboard')">RANK</button>
        <button onclick="showPage('referral')">FRIENDS</button>
    </nav>
</div>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAK315b3-j5RrIvx0vH2OE_mdd86Zbd8Wc",
  authDomain: "test-6f668.firebaseapp.com",
  databaseURL: "https://test-6f668-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "test-6f668",
  storageBucket: "test-6f668.firebasestorage.app",
  messagingSenderId: "1070554867228",
  appId: "1:1070554867228:web:8f4abf585baa1d82f5e1d9",
  measurementId: "G-7XZ8F2FD5K"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tg = window.Telegram.WebApp;
tg.expand();

// --- GAME STATE ---
let user = {
    id: tg.initDataUnsafe.user?.id || "guest_user",
    name: tg.initDataUnsafe.user?.first_name || "Guest",
    points: 0,
    energy: 500,
    lastClick: 0
};
let isBoosterActive = false;
let refillStartTime = null;

// --- CORE LOGIC ---
function clickCoin() {
    const now = Date.now();
    if (now - user.lastClick < 50) return; // Simple Anti-bot
    if (user.energy <= 0) {
        alert("Out of energy! Wait for refill or watch ads.");
        return;
    }

    let gain = isBoosterActive ? 10 : 1;
    user.points += gain;
    user.energy -= 1;
    user.lastClick = now;
    
    updateUI();
    saveData();
    
    if (user.energy === 0) startRefillTimer();
}

function startRefillTimer() {
    refillStartTime = Date.now() + (30 * 60 * 1000); // 30 mins
    const interval = setInterval(() => {
        const remaining = refillStartTime - Date.now();
        if (remaining <= 0) {
            user.energy = 500;
            clearInterval(interval);
            document.getElementById('refillTimer').innerText = "";
            updateUI();
        } else {
            document.getElementById('refillTimer').innerText = `Refill in: ${Math.floor(remaining/1000)}s`;
        }
    }, 1000);
}

function activateBooster() {
    // Simulate Ads Call
    tg.showConfirm("Watch an ad to get 10x multiplier for 10 seconds?", (ok) => {
        if(ok) {
            isBoosterActive = true;
            document.getElementById('clicker').classList.add('booster-active');
            setTimeout(() => {
                isBoosterActive = false;
                document.getElementById('clicker').classList.remove('booster-active');
            }, 10000);
        }
    });
}

// --- DATABASE SYNC ---
function saveData() {
    db.ref('users/' + user.id).update({
        points: user.points,
        name: user.name
    });
}

function loadLeaderboard() {
    db.ref('users').orderByChild('points').limitToLast(100).on('value', snap => {
        const list = [];
        snap.forEach(child => { list.push(child.val()); });
        list.reverse();
        
        let html = '';
        list.forEach((u, i) => {
            html += `<tr><td>#${i+1}</td><td>${u.name}</td><td>${u.points}</td></tr>`;
        });
        document.getElementById('leaderboardTable').innerHTML = html;
    });
}

// --- UI ROUTING ---
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if(pageId === 'leaderboard') loadLeaderboard();
}

function updateUI() {
    document.getElementById('scoreDisplay').innerText = user.points;
    document.getElementById('energyText').innerText = user.energy;
    document.getElementById('energyFill').style.width = (user.energy / 500 * 100) + "%";
}

document.getElementById('clicker').addEventListener('pointerdown', clickCoin);
updateUI();
</script>
</body>
</html>
