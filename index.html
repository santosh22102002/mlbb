<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RichAds Telegram Mini App Test</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- RichAds Telegram SDK -->
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

button{
  position:fixed;
  bottom:25px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
}
</style>

<script>
function loadAds(){

  try{

    window.TelegramAdsController = new TelegramAdsController();

    window.TelegramAdsController.initialize({
      pubId: "1004311",
      appId: "6445"
    });

    alert("Ad request sent");

  }catch(e){

    alert("Ads failed: " + e);

  }

}
</script>

</head>

<body>

<h2>RichAds Telegram Mini App Test</h2>

<button onclick="loadAds()">Load Ad</button>

</body>
</html>
