<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #248bed;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 20px;
            padding-bottom: 50px;
        }
        .left-align { text-align: left; }
        .timer { color: #e74c3c; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .prize { font-size: 1.5rem; color: #2ecc71; font-weight: 800; }
        .spacer { height: 35px; }
        .section-title { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.03); border-radius: 8px; overflow: hidden; }
        td { border: 1px solid var(--tg-theme-hint-color); padding: 12px; text-align: center; font-family: monospace; font-weight: bold; width: 25%; }
        
        .claim-btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; padding: 18px; border-radius: 12px;
            font-size: 1rem; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer;
        }
        .claim-btn:disabled { background-color: var(--tg-theme-hint-color); opacity: 0.6; }
        #cooldown-text { text-align: center; font-size: 0.85rem; margin-top: 8px; color: var(--tg-theme-hint-color); }
        #winner-box { display: none; background: #f1c40f; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="winner-box">🎉 LATEST WINNER: #<span id="win-num"></span> 🎉</div>

    <div class="left-align">
        <h1 style="margin:0;">Daily Lottery</h1>
        <div id="lottery-timer" class="timer">Checking status...</div>
        <div class="prize">$500.00 PRIZE</div>
    </div>

    <div class="spacer"></div>

    <div class="section-title">Your Tickets (<span id="count">0</span>/50)</div>
    <table id="ticket-table"></table>

    <button id="claim-btn" class="claim-btn" onclick="handleClaim()">CLAIM TICKET (Watch Ad)</button>
    <div id="cooldown-text"></div>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = { apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8", projectId: "upwebapp-19b3a", appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const AdController = window.Adsgram.init({ blockId: "24315" });
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe.user?.id || "guest_user";
        let userTickets = [];
        let nextClaimTime = 0;

        // 2. APP LOGIC
        async function init() {
            loadUserData();
            checkGlobalWinner();
            setInterval(updateUI, 1000);
        }

        async function loadUserData() {
            const doc = await db.collection('users').doc(userId.toString()).get();
            if (doc.exists) {
                userTickets = doc.data().tickets || [];
                nextClaimTime = doc.data().nextClaimTime || 0;
                renderTickets();
            }
        }

        function renderTickets() {
            const table = document.getElementById('ticket-table');
            document.getElementById('count').innerText = userTickets.length;
            table.innerHTML = "";
            for (let i = 0; i < userTickets.length; i += 4) {
                let row = table.insertRow();
                for (let j = 0; j < 4; j++) {
                    let cell = row.insertCell();
                    cell.innerText = userTickets[i+j] || "-";
                }
            }
        }

        function updateUI() {
            const now = new Date();
            const h = now.getHours();
            const timerEl = document.getElementById('lottery-timer');
            const btn = document.getElementById('claim-btn');

            // 5 PM (17:00) to 12 AM (00:00) Open
            const isOpen = (h >= 17 || h < 0);
            timerEl.innerText = isOpen ? "Status: OPEN" : "Opens at 5:00 PM";
            timerEl.style.color = isOpen ? "#2ecc71" : "#e74c3c";

            if (!isOpen) {
                btn.disabled = true;
                btn.innerText = "LOTTERY CLOSED";
                return;
            }

            if (userTickets.length >= 50) {
                btn.disabled = true;
                btn.innerText = "MAX TICKETS (50/50)";
                return;
            }

            const wait = nextClaimTime - Date.now();
            if (wait > 0) {
                btn.disabled = true;
                const m = Math.floor(wait / 60000);
                const s = Math.floor((wait % 60000) / 1000);
                btn.innerText = `NEXT TICKET IN ${m}:${s < 10 ? '0' : ''}${s}`;
            } else {
                btn.disabled = false;
                btn.innerText = "CLAIM TICKET (Watch Ad)";
            }
        }

        async function handleClaim() {
    try {
        // Pass the userId to AdsGram so they can pass it to our server
        const result = await AdController.show({ userId: userId.toString() });
        
        if (result.done) {
            tg.showAlert("Ad finished! Your ticket is being processed...");
            
            // Wait 2 seconds for the server to finish, then reload data
            setTimeout(() => {
                loadUserData(); 
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    } catch (e) {
        tg.showAlert("Error playing ad.");
    }
}

        async function checkGlobalWinner() {
            const res = await db.collection('results').doc('latest').get();
            if (res.exists) {
                document.getElementById('winner-box').style.display = 'block';
                document.getElementById('win-num').innerText = res.data().winningTicket;
            }
        }

        init();
    </script>
</body>
</html>
