<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RichAds Test Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        // Initialize the Ads Controller
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1004311",
            appId: "6445",
        });
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .status-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: 80%;
        }

        /* Simulating a bottom-anchored placement area */
        .ad-tester-area {
            padding: 10px;
            background: #f9f9f9;
            border-top: 1px dashed #ccc;
            font-size: 12px;
            color: #888;
        }

        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="status-card">
            <h3>RichAds Tester</h3>
            <p id="status">Waiting for SDK...</p>
            <button onclick="checkAds()">Trigger Ad Check</button>
        </div>
    </div>

    <div class="ad-tester-area">
        Ads should initialize and appear near the bottom
    </div>

    <script>
        // Notify Telegram that the Mini App is ready
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        document.getElementById('status').innerText = "SDK Initialized: ID 1004311";

        function checkAds() {
            // Check console for any RichAds internal logs
            console.log("RichAds Controller:", window.TelegramAdsController);
            alert("Checking for available ads...");
        }
    </script>
</body>
</html>
