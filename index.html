<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TMA Ad Test</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script> <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-weight: bold;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }
        #status { font-size: 14px; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Ad Test</h3>
        <p id="status">Initializing SDK...</p>
        <button id="adBtn">Play Rewarded Ad</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Make the app full height

        const statusEl = document.getElementById('status');
        const btn = document.getElementById('adBtn');

        // Initialize Onclicka (REPLACE WITH YOUR ID)
        window.initCdTma?.({ id: 'Your Spot ID' })
            .then(show => {
                window.show = show;
                statusEl.innerText = "Ready to play!";
            })
            .catch(err => {
                statusEl.innerText = "Init Error (Check Console)";
                console.error(err);
            });

        btn.onclick = () => {
            if (window.show) {
                statusEl.innerText = "Loading Ad...";
                window.show()
                    .then(() => {
                        statusEl.innerText = "Success! Ad watched.";
                        tg.HapticFeedback.notificationOccurred('success');
                    })
                    .catch(err => {
                        statusEl.innerText = "Ad skipped/failed.";
                        console.log("Ad Error:", err);
                    });
            } else {
                tg.showAlert("SDK not initialized yet.");
            }
        };
    </script>
</body>
</html>
