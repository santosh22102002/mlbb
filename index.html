<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onclicka TMA Ad Test</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .status-box {
            margin-bottom: 20px;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: 1px solid #ddd;
        }

        button {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .log-info { color: var(--hint); font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ad Manager Test</h2>
        
        <div id="status" class="status-box">🔄 Checking SDK...</div>
        
        <button id="adBtn" disabled>Play Rewarded Ad</button>
        
        <div class="log-info">
            Open the gear icon (bottom right) <br> to see the console logs.
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('adBtn');
        const statusEl = document.getElementById('status');

        // Tell Telegram the app is ready
        tg.ready();
        tg.expand();

        // --- IMPORTANT: REPLACE THIS ID ---
        const SPOT_ID = '6112917'; 
        // ----------------------------------

        function initAdSDK() {
            console.log("Attempting to initialize Onclicka SDK...");

            if (typeof window.initCdTma === 'function') {
                window.initCdTma({ id: SPOT_ID })
                    .then(show => {
                        window.showAd = show;
                        statusEl.innerText = "✅ SDK Ready";
                        statusEl.style.color = "green";
                        btn.disabled = false;
                        console.log("SDK successfully initialized.");
                    })
                    .catch(err => {
                        statusEl.innerText = "❌ Init Failed";
                        console.error("Initialization Error:", err);
                        tg.showAlert("Failed to load ads. Check your Spot ID.");
                    });
            } else {
                statusEl.innerText = "❌ SDK Script Not Loaded";
                console.error("window.initCdTma is not a function. Check if tma.js is blocked.");
            }
        }

        btn.onclick = () => {
            if (window.showAd) {
                statusEl.innerText = "⌛ Loading Ad...";
                btn.disabled = true;

                window.showAd()
                    .then(() => {
                        statusEl.innerText = "💰 Ad Finished! Reward User.";
                        tg.HapticFeedback.notificationOccurred('success');
                        console.log("Ad completed successfully.");
                        btn.disabled = false;
                    })
                    .catch(err => {
                        statusEl.innerText = "⚠️ Ad Closed/Error";
                        console.warn("Ad result:", err);
                        btn.disabled = false;
                    });
            }
        };

        // Run init when window loads
        window.onload = initAdSDK;
    </script>
</body>
</html>
