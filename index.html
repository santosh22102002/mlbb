<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // TODO: Replace with your Firebase Project Config
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAK315b3-j5RrIvx0vH2OE_mdd86Zbd8Wc",
  authDomain: "test-6f668.firebaseapp.com",
  databaseURL: "https://test-6f668-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "test-6f668",
  storageBucket: "test-6f668.firebasestorage.app",
  messagingSenderId: "1070554867228",
  appId: "1:1070554867228:web:8f4abf585baa1d82f5e1d9",
  measurementId: "G-7XZ8F2FD5K"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Initialize RichAds
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1004311",
            appId: "6445",
        });

        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || "guest_user";

        async function claimTicket() {
            const userRef = doc(db, "users", userId.toString());
            const userSnap = await getDoc(userRef);
            const currentCount = userSnap.exists() ? userSnap.data().count : 0;

            if (currentCount >= 50) {
                alert("You've reached the limit of 50 tickets!");
                return;
            }

            // Trigger the Ad
            window.TelegramAdsController.showAd({
                onCompleted: () => {
                    generateTicket(userRef, currentCount);
                },
                onSkipped: () => {
                    alert("You must watch the full ad to get a ticket.");
                },
                onError: (err) => {
                    console.error("Ad Error:", err);
                }
            });
        }

        async function generateTicket(userRef, currentCount) {
            const ticketNumber = "#" + Math.floor(1000 + Math.random() * 9000);
            
            try {
                await setDoc(userRef, {
                    tickets: arrayUnion(ticketNumber),
                    count: currentCount + 1
                }, { merge: true });

                document.getElementById('ticket-display').innerText = `New Ticket: ${ticketNumber}`;
                document.getElementById('count').innerText = currentCount + 1;
            } catch (e) {
                console.error("Error adding ticket: ", e);
            }
        }

        window.claimTicket = claimTicket;
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .count-text { margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Mini Lottery</h2>
        <p>Watch an ad to get a ticket (Max 50)</p>
        <h3 id="ticket-display">No tickets yet</h3>
        <button onclick="claimTicket()">📺 Watch Ad & Claim</button>
        <p class="count-text">Tickets: <span id="count">0</span>/50</p>
    </div>
</body>
</html>
