<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AdsGram Test</title>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body style="text-align:center;margin-top:50px;font-family:sans-serif">

<h2>AdsGram Rewarded Ads Test</h2>

<button onclick="showAd()" style="padding:15px 30px;font-size:18px">
Watch Ad
</button>

<script>
const AdController = window.Adsgram.init({
  blockId: 24441",
  debug: true
});

function showAd(){
  AdController.show().then(() => {
    alert("User watched the ad. Reward them!");
  }).catch((error) => {
    alert("Ad error: " + error);
  });
}
</script>

</body>
</html>
