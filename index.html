<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini Lottery</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1004311",
            appId: "6445",
        });
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .ticket-display { font-size: 48px; font-weight: bold; color: #0088cc; margin: 20px 0; }
        .progress { margin-bottom: 20px; font-weight: bold; }
        button { background-color: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; transition: opacity 0.3s; }
        button:disabled { background-color: #aaaaaa; cursor: not-allowed; }
        .ticket-list { margin-top: 20px; text-align: left; background: white; border-radius: 10px; padding: 10px; max-height: 150px; overflow-y: auto; color: #333; }
        .ticket-item { border-bottom: 1px solid #eee; padding: 5px 0; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎟️ Mini Lottery</h2>
        <div class="progress" id="counter-text">Tickets: 0 / 50</div>
        <div class="ticket-display" id="main-count">0</div>
        
        <button id="claimBtn" onclick="handleClaim()">Claim 1 Ticket (Ad)</button>

        <div class="ticket-list" id="ticket-list">
            <div style="text-align:center; color: #999;">No tickets yet</div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAK315b3-j5RrIvx0vH2OE_mdd86Zbd8Wc",
  authDomain: "test-6f668.firebaseapp.com",
  databaseURL: "https://test-6f668-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "test-6f668",
  storageBucket: "test-6f668.firebasestorage.app",
  messagingSenderId: "1070554867228",
  appId: "1:1070554867228:web:8f4abf585baa1d82f5e1d9",
  measurementId: "G-7XZ8F2FD5K"
};

        // --- 2. INITIALIZATION ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        
        tg.ready();
        tg.expand();

        // Get User ID from Telegram or fallback for browser testing
        const userId = tg.initDataUnsafe?.user?.id || "dev_user";
        const userRef = db.ref('lottery_users/' + userId);
        
        let currentTickets = 0;

        // --- 3. REALTIME DATABASE SYNC ---
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentTickets = data.count || 0;
                updateUI(data.tickets || {});
            }
        });

        function updateUI(ticketsObj) {
            document.getElementById('counter-text').innerText = `Tickets: ${currentTickets} / 50`;
            document.getElementById('main-count').innerText = currentTickets;
            
            const listDiv = document.getElementById('ticket-list');
            const ticketsArray = Object.values(ticketsObj);
            
            if (ticketsArray.length > 0) {
                listDiv.innerHTML = ticketsArray.map(t => `<div class="ticket-item">🎫 Ticket #${t}</div>`).reverse().join('');
            }

            if (currentTickets >= 50) {
                const btn = document.getElementById('claimBtn');
                btn.disabled = true;
                btn.innerText = "Limit Reached (50/50)";
            }
        }

        // --- 4. ADS & TICKET GENERATION ---
        async function handleClaim() {
    const btn = document.getElementById('claimBtn');
    
    if (currentTickets >= 50) return;

    // Show loading state so user knows it's working
    btn.disabled = true;
    btn.innerText = "Loading Ad...";

    try {
        window.TelegramAdsController.showAd({
            onAdCompleted: () => {
                addNewTicket();
                btn.disabled = false;
                btn.innerText = "Claim 1 Ticket (Ad)";
            },
            onAdError: (err) => {
                console.error("Ad Error:", err);
                // Important: Reset button if ad fails
                btn.disabled = false;
                btn.innerText = "Claim 1 Ticket (Ad)";
                tg.showAlert("Ad not ready. Please try again in a few seconds.");
            }
        });
    } catch (e) {
        btn.disabled = false;
        btn.innerText = "Claim 1 Ticket (Ad)";
        alert("Controller Error: " + e.message);
    }
}
        function addNewTicket() {
            const ticketNumber = Math.floor(100000 + Math.random() * 900000); // Random 6-digit
            
            // Atomic update: increment count and push ticket
            userRef.transaction((currentData) => {
                if (currentData === null) {
                    return { count: 1, tickets: { [Date.now()]: ticketNumber } };
                }
                if (currentData.count >= 50) return; // Prevent over-limit
                
                currentData.count = (currentData.count || 0) + 1;
                if (!currentData.tickets) currentData.tickets = {};
                currentData.tickets[Date.now()] = ticketNumber;
                
                return currentData;
            });
        }
    </script>
</body>
</html>
