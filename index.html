<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1004311",
            appId: "6445",
        });
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ticket-count { font-size: 24px; font-weight: bold; color: #0088cc; }
        button { background: #0088cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
        #ticket-list { margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Lottery Tickets</h2>
        <div class="ticket-count" id="count">0 / 50</div>
        <p>Watch an ad to claim a ticket!</p>
        <button id="claimBtn" onclick="showAd()">Claim Ticket</button>
        
        <div id="ticket-list">
            <strong>Your Numbers:</strong>
            <ul id="numbers"></ul>
        </div>
    </div>

    <script>
        // 1. Firebase Configuration (Replace with your actual config)
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAK315b3-j5RrIvx0vH2OE_mdd86Zbd8Wc",
  authDomain: "test-6f668.firebaseapp.com",
  databaseURL: "https://test-6f668-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "test-6f668",
  storageBucket: "test-6f668.firebasestorage.app",
  messagingSenderId: "1070554867228",
  appId: "1:1070554867228:web:8f4abf585baa1d82f5e1d9",
  measurementId: "G-7XZ8F2FD5K"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Telegram User Data
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        let ticketCount = 0;

        // 3. Sync with Firebase
        const userRef = db.ref('users/' + userId);
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                ticketCount = data.count || 0;
                document.getElementById('count').innerText = `${ticketCount} / 50`;
                updateUI(data.tickets);
                
                if (ticketCount >= 50) {
                    document.getElementById('claimBtn').disabled = true;
                    document.getElementById('claimBtn').innerText = "Limit Reached";
                }
            }
        });

        // 4. Show Ad and Generate Ticket
        function showAd() {
            if (ticketCount >= 50) return;

            // Trigger RichAds
            window.TelegramAdsController.showAd({
                onAdCompleted: () => {
                    generateTicket();
                },
                onAdError: (err) => {
                    console.error("Ad failed", err);
                    alert("Failed to load ad. Please try again.");
                }
            });
        }

        function generateTicket() {
            const newTicket = Math.floor(100000 + Math.random() * 900000); // 6-digit number
            const newCount = ticketCount + 1;

            userRef.update({
                count: newCount,
            });
            
            // Push new ticket number to list
            userRef.child('tickets').push(newTicket);
        }

        function updateUI(tickets) {
            const list = document.getElementById('numbers');
            list.innerHTML = "";
            if (tickets) {
                Object.values(tickets).forEach(num => {
                    const li = document.createElement('li');
                    li.innerText = `Ticket: #${num}`;
                    list.appendChild(li);
                });
            }
        }
    </script>
</body>
</html>
