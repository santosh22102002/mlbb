<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <style>
        :root {
            --bg: #0f0c29;
            --gold: #fcc200;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: var(--white);
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        /* UI Structure */
        .left-align { text-align: left; margin-bottom: 20px; }
        
        h1 { font-size: 26px; margin: 0; color: var(--gold); }
        .timer-label { font-size: 14px; opacity: 0.7; margin-top: 10px; }
        .timer-val { font-size: 20px; font-weight: bold; }
        
        .prize-box { margin-top: 15px; }
        .prize-amt { font-size: 24px; font-weight: 800; color: #00ff88; }

        .winner-box { margin-top: 15px; padding: 10px 0; min-height: 50px; }
        .winner-num { font-size: 28px; font-weight: bold; color: var(--gold); letter-spacing: 2px; }

        .spacer { height: 30px; }

        .ticket-section-title { font-size: 18px; margin-bottom: 15px; opacity: 0.9; }

        /* Ticket Table (No borders) */
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .ticket-slot {
            background: var(--glass);
            padding: 10px 2px;
            border-radius: 8px;
            font-size: 10px;
            text-align: center;
            color: #ddd;
        }

        .ticket-slot.active {
            background: rgba(252, 194, 0, 0.2);
            color: var(--gold);
            font-weight: bold;
        }

        /* Claim Button */
        #claim-btn {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #FF512F, #DD2476);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #claim-btn:disabled {
            background: #444;
            opacity: 0.6;
        }

        #cooldown-ui {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div id="loader">Syncing Lottery Data...</div>

    <div class="left-align">

        <div class="prize-box">

        </div>

        <div class="winner-box">
            <div class="timer-label">Latest Winner Ticket</div>
            <div id="winner-display" class="winner-num">---- ----</div>
        </div>
    </div>

    <div class="spacer"></div>

    <div class="ticket-section-title">Your Ticket Numbers</div>
    <div id="ticket-container" class="ticket-grid"></div>
    <div style="height: 120px;"></div> <button id="claim-btn" onclick="showRewardAd()">Claim Ticket (Watch Ad)</button>

    // --- 3. TIME LOGIC ---
    function updateClock() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const statusEl = document.getElementById('lottery-status');
        const claimBtn = document.getElementById('claim-btn');

        // Logic: Start 5am, End 12pm, Result 1pm, Reset 5pm
        let isOpen = (hrs >= 5 && hrs < 12);
        let isDrawing = (hrs >= 12 && hrs < 13);
        
        if (isOpen) {
            statusEl.innerText = `Open! Closes in ${11 - hrs}h ${60 - mins}m`;
        } else if (isDrawing) {
            statusEl.innerText = "Drawing Winners...";
        } else {
            statusEl.innerText = "Closed. Starts at 5 AM";
        }

        // Cooldown check
        const timeSinceLast = Date.now() - lastClaimTime;
        const cooldownActive = timeSinceLast < COOLDOWN_MS;

        if (!isOpen) {
            claimBtn.disabled = true;
            claimBtn.innerText = "Lottery Closed";
        } else if (userTickets.length >= MAX_TICKETS) {
            claimBtn.disabled = true;
            claimBtn.innerText = "Max Tickets (50/50)";
        } else if (cooldownActive) {
            claimBtn.disabled = true;
            const remain = Math.ceil((COOLDOWN_MS - timeSinceLast) / 60000);
            claimBtn.innerText = `Wait ${remain} min...`;
        } else {
            claimBtn.disabled = false;
            claimBtn.innerText = "Claim Ticket (Watch Ad)";
        }
    }
